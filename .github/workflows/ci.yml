name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Abstractions live in WslContainerd.Net (not yet on nuget.org).
      # Place at ./WslContainerd.Net so ProjectReference paths resolve in CI.
      - name: Checkout WslContainerd.Net
        uses: actions/checkout@v4
        with:
          repository: XiaEmrys/WslContainerd.Net
          ref: master
          path: WslContainerd.Net

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore WslContainerd.Ollama.sln

      - name: Build
        run: dotnet build WslContainerd.Ollama.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack WslContainerd.Ollama.sln -c Release --no-build -o artifacts/nuget

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*.nupkg
